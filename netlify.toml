[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # model-viewer peers on a newer three than we pin; it bundles its own three.
  NPM_FLAGS = "--legacy-peer-deps"

# Serve the AR model files with the right MIME types
[[headers]]
  for = "/models/*.glb"
  [headers.values]
    Content-Type = "model/gltf-binary"

[[headers]]
  for = "/models/*.usdz"
  [headers.values]
    Content-Type = "model/vnd.usdz+zip"
